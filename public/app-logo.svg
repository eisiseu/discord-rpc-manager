  <polygon points="246,232 246,258 268,245" fill="url(#g3)"/>

  <!-- Status dot -->
  <circle cx="340" cy="340" r="24" fill="#0f0f1a"/>
  <circle cx="340" cy="340" r="16" fill="#22c55e"/>

  <!-- Decorative corner accents -->
  <path d="M80 140 L80 108 L112 108" fill="none" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
  <path d="M432 140 L432 108 L400 108" fill="none" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
  <path d="M80 372 L80 404 L112 404" fill="none" stroke="url(#g2)" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
  <path d="M432 372 L432 404 L400 404" fill="none" stroke="url(#g2)" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
