      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="g3" x1="256" y1="100" x2="256" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Outer orbit ring -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="url(#g1)" stroke-width="2.5" opacity="0.2"/>

