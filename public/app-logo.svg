  <circle cx="420" cy="350" r="6" fill="#8b5cf6" opacity="0.4"/>
  <circle cx="92" cy="350" r="7" fill="#06b6d4" opacity="0.45"/>

  <!-- Main shield shape -->
  <path d="M256 108 C256 108 340 108 380 148 C420 188 420 256 420 256 C420 320 380 368 256 420 C132 368 92 320 92 256 C92 256 92 188 132 148 C172 108 256 108 256 108 Z" fill="url(#g3)" opacity="0.12"/>
  <path d="M256 108 C256 108 340 108 380 148 C420 188 420 256 420 256 C420 320 380 368 256 420 C132 368 92 320 92 256 C92 256 92 188 132 148 C172 108 256 108 256 108 Z" fill="none" stroke="url(#g1)" stroke-width="2.5" opacity="0.5"/>

  <!-- Inner diamond -->
  <path d="M256 160 L340 256 L256 352 L172 256 Z" fill="url(#g2)" opacity="0.25"/>
  <path d="M256 160 L340 256 L256 352 L172 256 Z" fill="none" stroke="url(#g2)" stroke-width="2" opacity="0.6"/>

  <!-- Center hexagon -->
  <polygon points="256,196 296,220 296,268 256,292 216,268 216,220" fill="url(#g1)" opacity="0.9"/>
  <polygon points="256,196 296,220 296,268 256,292 216,268 216,220" fill="none" stroke="white" stroke-width="1.5" opacity="0.3"/>

  <!-- Inner triangle -->
  <polygon points="256,216 278,252 234,252" fill="white" opacity="0.9"/>

